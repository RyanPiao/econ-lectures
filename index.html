<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Lecture Slides — Northeastern University</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #fafafa; color: #2d2d2d; padding: 60px 40px; max-width: 800px; margin: 0 auto; }
h1 { font-size: 28px; margin-bottom: 8px; }
.subtitle { color: #666; margin-bottom: 40px; }
.course { margin-bottom: 30px; }
.course h2 { font-size: 18px; color: #6b8ba4; margin-bottom: 10px; border-bottom: 2px solid #eee; padding-bottom: 6px; }
.course ul { list-style: none; padding-left: 0; }
.course li { padding: 6px 0; }
.course a { color: #2d2d2d; text-decoration: none; font-size: 15px; }
.course a:hover { color: #c47b5a; text-decoration: underline; }
</style>
</head>
<body>
<h1>Lecture Slides</h1>
<p class="subtitle">Northeastern University — Prof. Ryan Piao</p>
<div id="courses"></div>
<script>
// Auto-populate from directory structure
const courses = {
  "ECON 1116 — Principles of Microeconomics": "econ1116",
  "ECON 2316 — Microeconomic Theory": "econ2316",
  "ECON 3916 — Statistical & Machine Learning for Economics": "econ3916",
  "ECON 5200 — Applied Data Analytics in Economics": "econ5200"
};
const container = document.getElementById("courses");
for (const [title, dir] of Object.entries(courses)) {
  container.innerHTML += `<div class="course"><h2>${title}</h2><p><a href="${dir}/">View chapters →</a></p></div>`;
}
</script>
</body>
</html>
